[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v 
    --strict-markers 
    --tb=short
    --disable-warnings

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (database, cache, etc.)
    slow: Slow tests
    auth: Authentication tests
    api: API endpoint tests
