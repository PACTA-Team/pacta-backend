version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pacta-postgres
    environment:
      POSTGRES_USER: pacta
      POSTGRES_PASSWORD: pacta_dev_password
      POSTGRES_DB: pacta
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacta"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pacta-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pacta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pacta-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: pacta-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio/data
    command: server /minio/data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pacta-network

  # PgAdmin (opcional, para debugging)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pacta-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pacta.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pacta-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  pacta-network:
    driver: bridge
